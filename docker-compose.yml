services:
  capacitarr:
    build: .
    container_name: capacitarr
    ports:
      - "2187:2187"
    environment:
      - PUID=1001
      - PGID=1001
      - DEBUG=true
    volumes:
      - capacitarr-config:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2187/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

volumes:
  capacitarr-config:
